spring:
  application:
    name: ai-passage-creator1
  # MySQL ?????
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/ai_passage_creator
    username: root
    password: 1234
  session:
    store-type: redis
    # session 30 ???
    timeout: 2592000
  # Redis ??
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      password:
server:
  port: 8567
  servlet:
    context-path: /api
    # cookie 30 ???
    session:
      cookie:
        max-age: 2592000
# springdoc-openapi ??
springdoc:
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.yhj.aipassagecreator1.controller
# knife4j ??????
knife4j:
  enable: true
  setting:
    language: zh_cn

mybatis-flex:
  configuration:
    map-underscore-to-camel-case: false



